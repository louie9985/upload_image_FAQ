services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: upload_image_faq
      POSTGRES_USER: upload_image_faq
      POSTGRES_PASSWORD: change-me
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U upload_image_faq -d upload_image_faq"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data

  backend:
    build:
      context: .
      dockerfile: Dockerfile
      network: host
      args:
        HTTP_PROXY: http://127.0.0.1:16478
        HTTPS_PROXY: http://127.0.0.1:16478
        http_proxy: http://127.0.0.1:16478
        https_proxy: http://127.0.0.1:16478
    environment:
      DJANGO_SECRET_KEY: "change-me"
      DJANGO_DEBUG: "False"
      DJANGO_ALLOWED_HOSTS: "129.211.215.38,localhost,127.0.0.1"
      DATABASE_URL: "postgres://upload_image_faq:change-me@postgres:5432/upload_image_faq"
      REDIS_URL: "redis://redis:6379/0"
      CORS_ALLOWED_ORIGINS: "http://129.211.215.38:3456,http://localhost:3456,http://127.0.0.1:3456,http://localhost:5173,http://127.0.0.1:5173"
      CSRF_TRUSTED_ORIGINS: "http://129.211.215.38:3456,http://localhost:3456,http://127.0.0.1:3456,http://localhost:5173,http://127.0.0.1:5173"
    volumes:
      - media_data:/app/media
      - static_data:/app/staticfiles
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  worker:
    build:
      context: .
      dockerfile: Dockerfile
      network: host
      args:
        HTTP_PROXY: http://127.0.0.1:16478
        HTTPS_PROXY: http://127.0.0.1:16478
        http_proxy: http://127.0.0.1:16478
        https_proxy: http://127.0.0.1:16478
    command: uv run celery -A config worker -l info
    environment:
      DJANGO_SECRET_KEY: "change-me"
      DJANGO_DEBUG: "False"
      DJANGO_ALLOWED_HOSTS: "129.211.215.38,localhost,127.0.0.1"
      DATABASE_URL: "postgres://upload_image_faq:change-me@postgres:5432/upload_image_faq"
      REDIS_URL: "redis://redis:6379/0"
      CORS_ALLOWED_ORIGINS: "http://129.211.215.38:3456,http://localhost:3456,http://127.0.0.1:3456,http://localhost:5173,http://127.0.0.1:5173"
      CSRF_TRUSTED_ORIGINS: "http://129.211.215.38:3456,http://localhost:3456,http://127.0.0.1:3456,http://localhost:5173,http://127.0.0.1:5173"
    volumes:
      - media_data:/app/media
      - static_data:/app/staticfiles
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  beat:
    build:
      context: .
      dockerfile: Dockerfile
      network: host
      args:
        HTTP_PROXY: http://127.0.0.1:16478
        HTTPS_PROXY: http://127.0.0.1:16478
        http_proxy: http://127.0.0.1:16478
        https_proxy: http://127.0.0.1:16478
    command: uv run celery -A config beat -l info
    environment:
      DJANGO_SECRET_KEY: "change-me"
      DJANGO_DEBUG: "False"
      DJANGO_ALLOWED_HOSTS: "129.211.215.38,localhost,127.0.0.1"
      DATABASE_URL: "postgres://upload_image_faq:change-me@postgres:5432/upload_image_faq"
      REDIS_URL: "redis://redis:6379/0"
      CORS_ALLOWED_ORIGINS: "http://129.211.215.38:3456,http://localhost:3456,http://127.0.0.1:3456,http://localhost:5173,http://127.0.0.1:5173"
      CSRF_TRUSTED_ORIGINS: "http://129.211.215.38:3456,http://localhost:3456,http://127.0.0.1:3456,http://localhost:5173,http://127.0.0.1:5173"
    volumes:
      - media_data:/app/media
      - static_data:/app/staticfiles
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "3456:80"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./frontend/dist:/usr/share/nginx/html:ro
      - media_data:/var/www/media
      - static_data:/var/www/static
    depends_on:
      - backend

volumes:
  pg_data:
  redis_data:
  media_data:
  static_data:
